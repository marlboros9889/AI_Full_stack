spring.application.name=marinboy-mybatis
server.port=8081

# Oracle XE
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@localhost:1521/XE}
spring.datasource.username=${DB_USERNAME:scott}
spring.datasource.password=${DB_PASSWORD:tiger}

# MyBatis
mybatis.type-aliases-package=com.marinboy.dto
mybatis.mapper-locations=classpath:mybatis/mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# Logging
logging.level.com.marinboy=info
logging.level.org.mybatis=warn
logging.level.org.apache.ibatis=warn
logging.level.org.springframework.jdbc=warn

# Kakao OAuth2 (Kakao Developers REST API key)
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID:not-configured}
spring.security.oauth2.client.registration.kakao.client-authentication-method=none
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.kakao.scope=profile_nickname
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# Admin service image upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=60MB
