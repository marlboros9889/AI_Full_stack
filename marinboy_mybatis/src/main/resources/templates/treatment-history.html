<!doctype html><html lang="ko" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>이전 시술 이력</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><style>body{background:#f5f2e9;color:#293227}.wrap{max-width:960px}.hero{background:linear-gradient(125deg,#44543f,#87997b);color:#fff;border-radius:24px}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}.item{background:#fffef9;border:1px solid #7f927033;border-radius:18px;padding:22px}.badge2{background:#dfe6d4;color:#394834;border-radius:99px;padding:6px 12px}@media(max-width:700px){.grid{grid-template-columns:1fr}}</style></head><body><th:block th:replace="~{fragments/layout :: header}"></th:block><main class="container wrap py-5"><section class="hero p-5 mb-4"><p class="fw-bold small">TREATMENT HISTORY</p><h1>이전 시술 이력</h1><p class="mb-0 opacity-75">완료·취소된 시술을 한 줄로 합치지 않고 카드별로 확인합니다.</p></section><div id="list" class="grid">불러오는 중입니다.</div></main><th:block th:replace="~{fragments/layout :: footer}"></th:block><script>async function load(){let me=await fetch('/api/auth/me');if(me.status===204){location='/login';return}let u=await me.json(),r=await fetch(`/api/customers/history?customerPhone=${encodeURIComponent(u.phone)}`),rows=await r.json();list.innerHTML=rows.length?rows.map(x=>`<article class="item"><div class="d-flex justify-content-between"><b class="fs-5">${x.serviceName}</b><span class="badge2">${x.status}</span></div><div class="text-muted mt-3">${x.reservationDateTime.replace('T',' ')}</div><small>${x.serviceCategory||''}${x.memo?' · '+x.memo:''}</small></article>`).join(''):'<div class="item text-muted">이전 시술 이력이 없습니다.</div>'}load();</script></body></html>
