<!doctype html><html lang="ko" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>나의 예약</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><style>body{background:#f5f2e9;color:#293227}.wrap{max-width:960px}.hero{background:linear-gradient(125deg,#44543f,#87997b);color:#fff;border-radius:24px}.item{background:#fffef9;border:1px solid #7f927033;border-radius:18px;padding:22px;box-shadow:0 14px 35px #36462f12}.status{background:#dfe6d4;color:#394834;border-radius:99px;padding:6px 12px;font-weight:700}.grid{display:grid;gap:16px}</style></head><body><th:block th:replace="~{fragments/layout :: header}"></th:block><main class="container wrap py-5"><section class="hero p-5 mb-4"><p class="fw-bold small">MY RESERVATIONS</p><h1>나의 예약 리스트</h1><p class="mb-0 opacity-75">진행 중인 예약을 건별로 확인하고 취소할 수 있습니다.</p></section><div id="list" class="grid">불러오는 중입니다.</div></main><th:block th:replace="~{fragments/layout :: footer}"></th:block><script>const labels={REQUESTED:'요청',CONFIRMED:'확정'};async function load(){let r=await fetch('/api/customers/my-reservations');if(r.status===401){location='/login';return}let rows=await r.json();list.innerHTML=rows.length?rows.map(x=>`<article class="item d-flex justify-content-between align-items-center"><div><b class="fs-5">${x.serviceName}</b><div class="text-muted mt-1">${x.reservationDateTime.replace('T',' ')}</div><small>${x.durationMinutes||''}분 · ${x.memo||'요청 사항 없음'}</small></div><div class="text-end"><span class="status">${labels[x.status]||x.status}</span><br><button class="btn btn-outline-danger btn-sm mt-3" onclick="cancelReservation(${x.id})">예약 취소</button></div></article>`).join(''):'<div class="item text-muted">진행 중인 예약이 없습니다.</div>'}async function cancelReservation(id){if(!confirm('이 예약을 취소하시겠습니까?'))return;let r=await fetch(`/api/customers/my-reservations/${id}`,{method:'DELETE'});if(!r.ok){let e=await r.json().catch(()=>({}));return alert(e.message||'완료된 예약은 취소할 수 없습니다.')}load()}load();</script></body></html>
