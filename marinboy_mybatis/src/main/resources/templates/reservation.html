<!doctype html>
<!-- 로그인 고객이 시술·날짜·시간을 선택해 예약을 신청하는 전용 화면입니다. -->
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>마린보이 예약하기</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root{--ink:#293227;--sage:#7f9270;--deep:#53664c;--ivory:#f5f2e9}body{min-height:100vh;background:radial-gradient(circle at 88% 6%,#dfe6d4,transparent 28rem),var(--ivory);color:var(--ink)}.wrap{max-width:1050px}.hero{background:linear-gradient(125deg,#52654b,#93a287);border-radius:24px;color:#fff}.card{border:1px solid #687e5b30;border-radius:22px;box-shadow:0 18px 45px #36462f1c}.kicker{letter-spacing:.13em;font-size:.75rem;font-weight:800;color:#e7eddc}.form-control,.form-select{border-radius:10px;min-height:48px;border-color:#687e5b45}.form-control:focus,.form-select:focus{border-color:var(--sage);box-shadow:0 0 0 .25rem #7f927026}.slot{border-radius:8px;margin:.2rem;padding:.5rem .9rem}.slot.active,.btn-gold{background:var(--deep);color:#fff;border:0}.warning{background:#fff8ec;border:1px solid #d7b56f;border-radius:14px;color:#76571e}.history-item{border-top:1px solid #687e5b30;padding:.8rem 0}.badge{background:#dfe6d4;color:#394834}
  .hero{position:relative;overflow:hidden;background:linear-gradient(125deg,#44543f,#87997b);box-shadow:0 24px 60px #36462f2b}
  .hero:after{content:"";position:absolute;right:-70px;top:-90px;width:280px;height:280px;border:1px solid #f0e2bd66;border-radius:50%}
  .card{background:#fffef9;border:1px solid #7f927026;box-shadow:0 22px 55px #36462f14}
  .form-control,.form-select{background:#fffefb;border:1px solid #7f927038;padding:.8rem 1rem;transition:.2s}
  .form-control:hover,.form-select:hover{border-color:#7f927070}
  .btn,.slot{border-radius:999px;font-weight:700;letter-spacing:.04em;transition:transform .2s,box-shadow .2s}
  .btn:hover,.slot:hover{transform:translateY(-2px)}
  .btn-gold{background:linear-gradient(135deg,#53664c,#718268);box-shadow:0 12px 28px #53664c35}
  .slot{border-color:#7f927055;color:#53664c;background:#fffef9}
  .slot.active{background:#53664c;box-shadow:0 8px 20px #53664c30}
  </style>
</head>
<body><main class="container wrap py-4 py-md-5">
  <a href="/" class="text-dark fw-bold text-decoration-none">← 시술 목록으로 돌아가기</a>
  <section class="hero p-4 p-md-5 my-3"><p class="kicker mb-2">MARINBOY PRIVATE SALON</p><h1>나만의 예약 시간</h1><p class="mb-0 opacity-75">날짜를 먼저 고른 뒤 예약 가능한 시간을 선택해 주세요.</p></section>
  <section class="card"><div class="row g-0">
    <aside class="col-lg-4 p-4 border-end"><h2 class="h4">예약 전 필수 확인</h2><div class="warning p-3 mt-3"><strong>⚠ 노쇼·당일 취소 주의</strong><br><b>무단 불참, 10분 이상 지각, 당일 취소 시 이후 예약이 제한될 수 있습니다.</b><br><small>예약은 고객과 매장의 소중한 약속입니다.</small></div></aside>
    <div class="col-lg-8 p-4"><form id="form">
      <label class="form-label fw-bold">선택한 시술</label><select id="serviceId" class="form-select mb-3" required></select>
      <div class="row g-3"><div class="col-md-6"><label class="form-label fw-bold">예약 날짜</label><input id="date" type="date" class="form-control" required></div><div class="col-md-6"><label class="form-label fw-bold">선택 시간</label><input id="timeText" class="form-control" readonly placeholder="아래에서 시간을 선택하세요"></div></div>
      <div class="bg-light rounded-4 p-3 my-3"><b>예약 가능 시간</b><div id="slots" class="mt-2 text-muted">날짜를 선택하면 표시됩니다.</div></div>
      <div id="sameDayBox" class="form-check alert alert-warning d-none"><input id="sameDay" class="form-check-input" type="checkbox"><label class="form-check-label fw-bold" for="sameDay">당일 예약은 최소 30분 전에 부탁드리며, 동일 시간 예약 시 접수 순서대로 진행됩니다. 동의합니다.</label></div>
      <div class="row g-3"><div class="col-md-6"><input id="name" class="form-control" placeholder="고객명" required></div><div class="col-md-6"><input id="phone" class="form-control" placeholder="연락처" required></div></div>
      <input id="email" type="email" class="form-control mt-3" placeholder="이메일" required><textarea id="memo" class="form-control mt-3" rows="3" placeholder="요청 사항"></textarea>
      <div class="form-check my-4"><input id="policy" class="form-check-input" type="checkbox" required><label for="policy" class="form-check-label fw-bold text-danger">노쇼 및 취소 제한 안내를 확인하고 동의합니다.</label></div>
      <button id="submit" class="btn btn-gold w-100 py-3 fw-bold">예약 요청하기</button><p id="message" class="fw-bold mt-3"></p>
    </form></div>
  </div></section>
  <section class="card mt-4"><div class="card-body p-4"><p class="kicker text-dark mb-1">CUSTOMER HISTORY</p><h2 class="h4">이전 시술 내역</h2><div id="history" class="text-muted">로그인 고객의 시술 이력을 불러오는 중입니다.</div></div></section>
</main><script>
const $=id=>document.getElementById(id), query=new URLSearchParams(location.search);let selectedDateTime='';
const localDate=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
function initialDate(){let d=new Date();if(d.getHours()>=16)d.setDate(d.getDate()+1);while(d.getDay()===0)d.setDate(d.getDate()+1);return localDate(d)}
function updateSameDay(){let today=localDate(new Date()),same=$('date').value===today;$('sameDayBox').classList.toggle('d-none',!same);$('sameDay').required=same;if(!same)$('sameDay').checked=false}
async function loadSlots(){selectedDateTime='';$('timeText').value='';updateSameDay();let r=await fetch(`/api/services/${$('serviceId').value}/available-slots?date=${$('date').value}`),d=await r.json(),list=d.availableSlots||[];$('slots').innerHTML=list.length?list.map(x=>`<button type="button" class="btn btn-outline-secondary slot" data-value="${x}">${x.slice(11,16)}</button>`).join(''):'<span>예약 가능한 시간이 없습니다.</span>';$('slots').querySelectorAll('.slot').forEach(b=>b.onclick=()=>{selectedDateTime=b.dataset.value;$('timeText').value=b.textContent;document.querySelectorAll('.slot').forEach(x=>x.classList.remove('active'));b.classList.add('active')});$('submit').disabled=!list.length}
async function loadHistory(phone){let r=await fetch(`/api/customers/history?customerPhone=${encodeURIComponent(phone)}`),rows=await r.json();$('history').innerHTML=rows.length?rows.map(x=>`<div class="history-item"><b>${x.serviceName}</b><span class="badge float-end">${x.status}</span><br><small>${x.reservationDateTime.replace('T',' ')}</small></div>`).join(''):'이전 시술 내역이 없습니다.'}
async function init(){let services=await(await fetch('/api/services')).json();$('serviceId').innerHTML=services.map(x=>`<option value="${x.id}">${x.name} · ${x.durationMinutes}분 · ${Number(x.price).toLocaleString()}원</option>`).join('');$('serviceId').value=query.get('serviceId')||services[0].id;$('date').min=localDate(new Date());$('date').value=query.get('date')||initialDate();let me=await fetch('/api/auth/me');if(me.status===204){location='/login';return}let u=await me.json();$('name').value=u.displayName||u.name||'';$('email').value=u.email||'';$('phone').value=u.phone||'';await Promise.all([loadSlots(),loadHistory(u.phone)]);let requestedTime=query.get('time');if(requestedTime){let button=[...$('slots').querySelectorAll('.slot')].find(item=>item.textContent.trim()===requestedTime);if(button)button.click()}}
$('serviceId').onchange=loadSlots;
$('date').onchange=loadSlots;
$('form').onsubmit=async event=>{
  event.preventDefault();
  if(!selectedDateTime)return alert('예약 시간을 선택하세요.');
  if($('date').value===localDate(new Date())&&!$('sameDay').checked)return alert('당일 예약 안내에 동의해 주세요.');
  $('submit').disabled=true;
  const body={serviceId:+$('serviceId').value,customerName:$('name').value,customerEmail:$('email').value,customerPhone:$('phone').value,reservationDateTime:selectedDateTime,noShowPolicyAgreed:$('policy').checked,memo:$('memo').value};
  const response=await fetch('/api/reservations',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!response.ok){
    const error=await response.json().catch(()=>({message:'예약에 실패했습니다.'}));
    $('message').className='fw-bold mt-3 text-danger';
    $('message').textContent=error.message||'예약에 실패했습니다.';
    $('submit').disabled=false;
    return;
  }
  // 예약 완료를 알린 뒤 고객이 처음 보던 메인 화면으로 반드시 이동합니다.
  alert('예약요청이 등록되었습니다.');
  window.location.replace('/');
};
init();
</script></body></html>
