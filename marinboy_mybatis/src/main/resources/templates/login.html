<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-5" style="max-width: 420px">
    <div class="card shadow">
        <div class="card-body p-4">
            <h1 class="h3">마린보이 로그인</h1>
            <p class="text-muted">고객: customer / customer123<br>관리자: admin / admin123</p>
            <form id="loginForm">
                <input class="form-control mb-2" name="username" placeholder="아이디" required>
                <input class="form-control mb-3" name="password" type="password" placeholder="비밀번호" required>
                <button class="btn btn-dark w-100">로그인</button>
            </form>
            <div class="text-center text-muted my-3" th:if="${kakaoLoginEnabled}">또는</div>
            <a th:if="${kakaoLoginEnabled}" class="btn w-100 fw-semibold" style="background:#FEE500;color:#191919"
               href="/oauth2/authorization/kakao">카카오로 로그인</a>
            <p th:unless="${kakaoLoginEnabled}" class="small text-muted text-center mt-3 mb-0">카카오 API 키 설정 후 소셜 로그인을 사용할 수 있습니다.</p>
            <p id="message" class="text-danger mt-3 mb-0"></p>
        </div>
    </div>
</main>
<script>
    const message = document.querySelector('#message');
    const oauthError = new URLSearchParams(location.search).get('oauthError');
    if (oauthError) message.textContent = '카카오 로그인 오류: ' + oauthError;

    document.querySelector('#loginForm').addEventListener('submit', async event => {
        event.preventDefault();
        const form = event.target;
        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: form.username.value, password: form.password.value})
            });
            if (!response.ok) {
                const error = await response.json();
                message.textContent = error.message || '로그인에 실패했습니다.';
                return;
            }
            const user = await response.json();
            location.href = user.role === 'ADMIN' ? '/admin' : '/';
        } catch (error) {
            message.textContent = '서버에 연결할 수 없습니다.';
        }
    });
</script>
</body>
</html>
