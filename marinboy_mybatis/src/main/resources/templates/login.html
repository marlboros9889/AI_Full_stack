<!DOCTYPE html>
<!-- 고객과 관리자의 계정 정보를 받아 세션 로그인을 요청하는 화면입니다. -->
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-5" style="max-width:420px">
    <div class="card shadow"><div class="card-body p-4">
        <h1 class="h3">마린보이 로그인</h1>
        <p class="text-muted">고객: customer / customer123<br>관리자: admin / admin123</p>
        <form id="loginForm">
            <input class="form-control mb-2" name="username" placeholder="아이디" required>
            <input class="form-control mb-3" name="password" type="password" placeholder="비밀번호" required>
            <button class="btn btn-dark w-100">로그인</button>
        </form>
        <p id="message" class="text-danger mt-3 mb-0"></p>
    </div></div>
</main>
<script>
    // 입력한 계정 정보를 로그인 API로 전송하고 권한에 맞는 첫 화면으로 이동합니다.
    document.querySelector('#loginForm').addEventListener('submit', async event => {
        event.preventDefault();
        const form = event.target;
        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: form.username.value, password: form.password.value})
        });
        if (!response.ok) {
            document.querySelector('#message').textContent = (await response.json()).message;
            return;
        }
        const user = await response.json();
        location.href = user.role === 'ADMIN' ? '/admin' : '/';
    });
</script>
</body>
</html>
