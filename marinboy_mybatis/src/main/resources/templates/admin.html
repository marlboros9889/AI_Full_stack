<!doctype html>
<!-- 관리자가 예약 상태, 휴무일, 시술 메뉴와 대표 이미지를 관리하는 화면입니다. -->
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>마린보이 관리자</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root{--sage:#7f9270;--deep:#53664c;--ivory:#f5f2e9;--gold:#a77b3f;--ink:#293227}
body{background:radial-gradient(circle at 90% 0,#dfe6d4,transparent 30rem),var(--ivory);color:var(--ink)}
.wrap{max-width:1280px}
.hero{position:relative;overflow:hidden;background:linear-gradient(125deg,#44543f,#87997b);color:#fff;border-radius:28px;box-shadow:0 25px 60px #36462f26}
.card{border:1px solid #7f927024;border-radius:22px;background:#fffef9;box-shadow:0 18px 45px #36462f13}
.service-card{border:1px solid #7f92702b;border-radius:18px;padding:18px;height:100%;background:#fffefb;box-shadow:0 12px 28px #36462f0d}
.service-image{width:100%;height:180px;object-fit:cover;border-radius:14px;background:#e7ebdf}
.form-control{min-height:46px;border-radius:12px;border-color:#7f927040;background:#fffefb}
.form-control:focus{border-color:var(--sage);box-shadow:0 0 0 .22rem #7f927021}
.btn{border-radius:999px;font-weight:700;letter-spacing:.035em;transition:transform .2s,box-shadow .2s}
.btn:hover{transform:translateY(-2px)}
.btn-gold{border:0;background:linear-gradient(135deg,#9f773e,#c39a57);color:#fff;box-shadow:0 10px 24px #8f65242d}
.btn-success{background:#718e72;border-color:#718e72}.btn-warning{background:#d7b56f;border-color:#d7b56f;color:#493816}
.btn-dark{background:var(--deep);border-color:var(--deep)}.btn-complete{background:linear-gradient(135deg,#087f8c,#0aa6a6);border-color:#087f8c;color:#fff;box-shadow:0 8px 18px #087f8c3d}.btn-complete:hover{background:#076e78;color:#fff}.btn.action-done,.btn.action-done:disabled{background:#e1e7dc;border-color:#c4d0bc;color:#56664e;opacity:1;box-shadow:none;cursor:default}.status-pill{display:inline-flex;align-items:center;gap:.35rem;padding:.36rem .68rem;border-radius:999px;font-weight:800;box-shadow:inset 0 0 0 1px transparent}.status-requested{background:#fff1d6;color:#8a5b12;box-shadow:inset 0 0 0 1px #e8bb6b66}.status-confirmed{background:#def2df;color:#256b36;box-shadow:inset 0 0 0 1px #56a46966}.status-complete{background:#d8f3ef;color:#056b70;box-shadow:inset 0 0 0 1px #07939a42}.status-complete:before,.status-confirmed:before{content:"✓"}.status-rejected,.status-canceled,.status-no-show{background:#f9e1e1;color:#a13e3e;box-shadow:inset 0 0 0 1px #cb666655}.btn-outline-primary{color:var(--deep);border-color:var(--sage)}
.table>:not(caption)>*>*{padding:.9rem .75rem;border-color:#7f927021}.table thead th{color:#607057;font-size:.83rem;letter-spacing:.05em;text-transform:uppercase}
.action-group{display:flex;flex-wrap:wrap;gap:.35rem}
</style>
</head><body><th:block th:replace="~{fragments/layout :: header}"></th:block><main class="container wrap py-4">
<section class="hero p-4 mb-4 d-flex justify-content-between"><div><h1>예약 운영 대시보드</h1><p class="mb-0">예약 상태·휴무일·시술 메뉴 관리</p></div><a class="btn btn-light align-self-center" href="/">← 메인 화면으로</a></section>
<div class="row g-4"><section class="col-lg-8"><div class="card"><div class="card-body p-4"><h2 class="h4">전체 예약 현황</h2><div class="table-responsive"><table class="table"><thead><tr><th>예약일시</th><th>고객 / 시술</th><th>상태</th><th>처리</th></tr></thead><tbody id="list"></tbody></table></div><div class="d-flex justify-content-between"><button id="prev" class="btn btn-outline-secondary">이전</button><span id="pageInfo"></span><button id="next" class="btn btn-outline-secondary">다음</button></div></div></div></section>
<aside class="col-lg-4"><div class="card"><div class="card-body p-4"><h2 class="h4">휴무일 관리</h2><form id="holidayForm"><input class="form-control mb-2" name="date" type="date" required><input class="form-control mb-2" name="reason" placeholder="휴무 사유"><button class="btn btn-gold w-100">저장</button></form><ul id="holidays" class="list-group mt-3"></ul></div></div></aside>
<section class="col-12"><div class="card"><div class="card-body p-4"><h2 class="h4">시술 메뉴 관리</h2>
<form id="serviceForm" class="row g-2" enctype="multipart/form-data"><input type="hidden" name="id"><div class="col-md-3"><input class="form-control" name="name" placeholder="시술명" required></div><div class="col-md-2"><input class="form-control" name="category" placeholder="카테고리" required></div><div class="col-md-2"><input class="form-control" name="durationMinutes" type="number" min="10" step="10" placeholder="시간(분)" required></div><div class="col-md-2"><input class="form-control" name="price" type="number" min="1000" step="1000" placeholder="가격" required></div><div class="col-md-3"><input class="form-control" name="description" placeholder="설명"></div><div class="col-md-6"><label class="form-label">대표 이미지</label><input class="form-control" name="image" type="file" accept="image/jpeg,image/png,image/gif,image/webp"></div><div class="col-md-6"><label class="form-label">상세 이미지 묶음 (최대 5장)</label><input class="form-control" name="galleryImages" type="file" accept="image/jpeg,image/png,image/gif,image/webp" multiple><small class="text-muted">수정 시 선택하지 않으면 기존 이미지 묶음을 유지합니다.</small></div><div class="col-12"><button class="btn btn-gold w-100">시술 저장</button></div></form>
<div id="services" class="row g-3 mt-3"></div></div></div></section>
<section class="col-12"><div class="card border-danger-subtle"><div class="card-body p-4"><h2 class="h4">2년 이전 데이터 정리</h2><p class="text-muted">완료·취소·거절·노쇼 예약과 연결되지 않은 오래된 고객, 삭제 처리된 메뉴만 정리합니다. 진행 중 예약과 운영 중 메뉴는 제외됩니다.</p><div id="retentionSummary" class="alert alert-light">정리 대상을 확인하는 중입니다.</div><div class="row g-2"><div class="col-md-8"><input id="retentionConfirmation" class="form-control" placeholder="2년 이전 데이터 정리"></div><div class="col-md-4"><button id="retentionCleanup" type="button" class="btn btn-outline-danger w-100 h-100">확인 후 정리</button></div></div></div></div></section>
</div></main>
<script>
const api='/api/admin/', labels={REQUESTED:'예약 대기',CONFIRMED:'예약 승인',REJECTED:'예약 거절',CANCELED:'예약 취소',COMPLETED:'시술 완료',NO_SHOW:'노쇼'};let page=0,size=5,serviceById=new Map();
const field=(f,n)=>f.elements.namedItem(n);async function request(url,o){let r=await fetch(url,o);if(!r.ok){let e=await r.json().catch(()=>({message:'처리에 실패했습니다.'}));alert(e.message||'처리에 실패했습니다.');return false}return true}
function actions(x){let active=['REQUESTED','CONFIRMED'].includes(x.status),confirmed=x.status==='CONFIRMED',completed=x.status==='COMPLETED';return `<div class="action-group"><button class="btn btn-sm ${confirmed?'action-done':'btn-success'}" ${x.status==='REQUESTED'?'':'disabled'} onclick="statusChange(${x.id},'CONFIRMED')">${confirmed?'✓ 승인 완료':'승인'}</button><button class="btn btn-sm btn-warning" ${active?'':'disabled'} onclick="reject(${x.id})">거절</button><button class="btn btn-sm btn-outline-danger" ${active?'':'disabled'} onclick="statusChange(${x.id},'CANCELED')">취소</button><button class="btn btn-sm ${completed?'action-done':'btn-complete'}" ${confirmed?'':'disabled'} onclick="statusChange(${x.id},'COMPLETED')">${completed?'✓ 시술 완료됨':'✓ 시술 완료'}</button></div>`}
function statusClass(status){return {REQUESTED:'status-requested',CONFIRMED:'status-confirmed',COMPLETED:'status-complete',REJECTED:'status-rejected',CANCELED:'status-canceled',NO_SHOW:'status-no-show'}[status]||''}async function load(){let r=await fetch(`${api}reservations?page=${page}&size=${size}`);if(!r.ok){location='/login';return}let d=await r.json();list.innerHTML=d.items.map(x=>`<tr><td>${x.reservationDateTime.replace('T',' ')}</td><td><b>${x.customerName}</b><br>${x.serviceName}</td><td><span class="status-pill ${statusClass(x.status)}">${labels[x.status]||x.status}</span></td><td>${actions(x)}</td></tr>`).join('');pageInfo.textContent=`${page+1} / ${Math.max(1,Math.ceil(d.total/size))}`;prev.disabled=page===0;next.disabled=(page+1)*size>=d.total;let h=await(await fetch(api+'holidays')).json();holidays.innerHTML=h.map(x=>`<li class="list-group-item d-flex justify-content-between">${x}<button class="btn btn-sm btn-danger" onclick="delHoliday('${x}')">삭제</button></li>`).join('');let s=await(await fetch(api+'services')).json();serviceById=new Map(s.map(x=>[String(x.id),x]));services.innerHTML=s.map(x=>`<div class="col-md-4"><div class="service-card">${x.imageUrl?`<img class="service-image mb-3" src="${x.imageUrl}" alt="${x.name}">`:''}<b>${x.name}</b><div class="text-muted">${x.category} · ${x.durationMinutes}분 · ${Number(x.price).toLocaleString()}원</div><button type="button" class="btn btn-sm btn-outline-primary mt-3" data-service-action="edit" data-service-id="${x.id}">수정</button> <button type="button" class="btn btn-sm btn-outline-danger mt-3" data-service-action="delete" data-service-id="${x.id}">삭제</button></div></div>`).join('')}
async function statusChange(id,status){if(await request(`${api}reservations/${id}/status?status=${status}`,{method:'PATCH'}))load()}async function reject(id){let reason=prompt('거절 사유를 입력하세요.');if(reason&&await request(`${api}reservations/${id}/reject?reason=${encodeURIComponent(reason)}`,{method:'PATCH'}))load()}
holidayForm.onsubmit=async e=>{e.preventDefault();if(await request(api+'holidays',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({holidayDate:e.target.date.value,reason:e.target.reason.value})})){e.target.reset();load()}};async function delHoliday(d){if(confirm('삭제하시겠습니까?')&&await request(`${api}holidays?holidayDate=${d}`,{method:'DELETE'}))load()}
function editService(x){['id','name','category','durationMinutes','price','description'].forEach(k=>field(serviceForm,k).value=x[k]||'');serviceForm.scrollIntoView({behavior:'smooth'})}async function delService(id){if(confirm('메뉴를 삭제하시겠습니까?')&&await request(api+'services/'+id,{method:'DELETE'}))load()}
services.addEventListener('click',e=>{const button=e.target.closest('[data-service-action]');if(!button)return;const id=button.dataset.serviceId;if(button.dataset.serviceAction==='edit'){const service=serviceById.get(id);if(service)editService(service);return}delService(id)});
async function loadRetentionSummary(){let r=await fetch(api+'data-retention');if(!r.ok)return;let x=await r.json();retentionSummary.textContent=`정리 가능: 예약 ${x.reservations}건 · 고객 ${x.customers}명 · 삭제 메뉴 ${x.services}건`}
retentionCleanup.onclick=async()=>{const confirmation=retentionConfirmation.value.trim();if(confirmation!=='2년 이전 데이터 정리')return alert('확인 문구를 정확히 입력하세요.');if(!confirm('복구할 수 없는 데이터 정리를 진행하시겠습니까?'))return;let r=await fetch(`${api}data-retention?confirmation=${encodeURIComponent(confirmation)}`,{method:'DELETE'});if(!r.ok){let e=await r.json().catch(()=>({message:'데이터 정리에 실패했습니다.'}));return alert(e.message)}let x=await r.json();alert(`정리 완료: 예약 ${x.reservations}건, 고객 ${x.customers}명, 메뉴 ${x.services}건`);retentionConfirmation.value='';loadRetentionSummary();load()};
// 파일을 포함한 FormData를 그대로 전송해 메뉴 정보와 대표 이미지를 함께 저장합니다.
serviceForm.onsubmit=async e=>{e.preventDefault();let f=e.target,id=field(f,'id').value,data=new FormData(f),files=[...field(f,'galleryImages').files,...field(f,'image').files];if(files.some(file=>file.size>10*1024*1024)){alert('이미지는 한 장당 10MB 이하로 선택해 주세요.');return}if(files.reduce((sum,file)=>sum+file.size,0)>60*1024*1024){alert('전체 이미지 용량은 60MB 이하로 선택해 주세요.');return}data.delete('id');if(await request(api+'services'+(id?'/'+id:''),{method:id?'PATCH':'POST',body:data})){f.reset();alert('시술 메뉴가 저장되었습니다.');load()}};
prev.onclick=()=>{page--;load()};next.onclick=()=>{page++;load()};load();loadRetentionSummary();
</script><th:block th:replace="~{fragments/layout :: footer}"></th:block></body></html>
