<!doctype html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>마린보이 관리자</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><style>
:root{--ink:#302523;--rose:#f7e5e9;--gold:#b98745}body{background:linear-gradient(135deg,#fff9fa,var(--rose));color:var(--ink)}.wrap{max-width:1280px}.hero{background:linear-gradient(125deg,#392725,#9d7047);color:#fff;border-radius:28px}.card{border:0;border-radius:20px;box-shadow:0 14px 35px #70494a18}.btn,.form-control{border-radius:10px}.btn-gold{background:var(--gold);color:#fff}.badge{background:#f7e2af;color:#4b311d}.service-card{border:1px solid #eee;border-radius:14px;padding:15px;height:100%}.action-group{display:flex;flex-wrap:wrap;gap:.25rem}.btn:disabled{opacity:.3}
</style></head><body><main class="container wrap py-4"><section class="hero p-4 mb-4 d-flex justify-content-between align-items-center"><div><h1>예약 운영 대시보드</h1><p class="mb-0 opacity-75">예약 상태·휴무일·시술 메뉴 관리</p></div><a class="btn btn-light" href="/">고객 화면</a></section><div class="row g-4">
<section class="col-lg-8"><div class="card"><div class="card-body p-4"><div class="d-flex justify-content-between"><h2 class="h4">전체 예약 현황</h2><span id="pageInfo" class="badge rounded-pill p-2"></span></div><div class="table-responsive"><table class="table align-middle"><thead><tr><th>예약일시</th><th>고객 / 시술</th><th>상태</th><th>처리</th></tr></thead><tbody id="list"></tbody></table></div><div class="d-flex justify-content-between"><button id="prev" class="btn btn-outline-secondary">이전</button><button id="next" class="btn btn-outline-secondary">다음</button></div></div></div></section>
<aside class="col-lg-4"><div class="card"><div class="card-body p-4"><h2 class="h4">휴무일 관리</h2><form id="holidayForm"><input class="form-control mb-2" name="date" type="date" required><input class="form-control mb-2" name="reason" placeholder="휴무 사유"><button class="btn btn-gold w-100">저장</button></form><ul id="holidays" class="list-group list-group-flush mt-3"></ul></div></div></aside>
<section class="col-12"><div class="card"><div class="card-body p-4"><h2 class="h4">시술 메뉴 관리</h2><form id="serviceForm" class="row g-2"><input type="hidden" name="id"><div class="col-md-3"><input class="form-control" name="name" placeholder="시술명" required></div><div class="col-md-2"><input class="form-control" name="category" placeholder="카테고리" required></div><div class="col-md-2"><input class="form-control" name="durationMinutes" type="number" min="10" step="10" placeholder="시간(분)" required></div><div class="col-md-2"><input class="form-control" name="price" type="number" min="1000" step="1000" placeholder="가격" required></div><div class="col-md-3"><input class="form-control" name="description" placeholder="설명"><button class="btn btn-gold w-100 mt-2">시술 저장</button></div></form><div id="services" class="row g-3 mt-3"></div></div></div></section>
</div></main><script>
const api='/api/admin/',labels={REQUESTED:'예약 대기',CONFIRMED:'예약 승인',REJECTED:'예약 거절',CANCELED:'예약 취소',COMPLETED:'시술 완료',NO_SHOW:'노쇼'};let page=0,size=5;
const disabled=(condition)=>condition?'disabled':'';
function actions(x){let waiting=x.status==='REQUESTED',confirmed=x.status==='CONFIRMED',past=new Date(x.reservationDateTime)<=new Date();return `<div class="action-group"><button class="btn btn-sm btn-success" ${disabled(!waiting)} onclick="changeStatus(${x.id},'CONFIRMED','${x.status}')">승인</button><button class="btn btn-sm btn-warning" ${disabled(!(waiting||confirmed))} onclick="reject(${x.id},'${x.status}')">거절</button><button class="btn btn-sm btn-outline-danger" ${disabled(!(waiting||confirmed))} onclick="changeStatus(${x.id},'CANCELED','${x.status}')">취소</button><button class="btn btn-sm btn-dark" ${disabled(!(confirmed&&past))} onclick="changeStatus(${x.id},'COMPLETED','${x.status}')">시술 완료</button></div>`}
async function load(){let r=await fetch(`${api}reservations?page=${page}&size=${size}`);if(!r.ok){location='/login';return}let d=await r.json();list.innerHTML=d.items.map(x=>`<tr><td>${x.reservationDateTime.replace('T',' ')}</td><td><b>${x.customerName}</b><br><small>${x.serviceName}</small></td><td><span class="badge">${labels[x.status]||x.status}</span></td><td>${actions(x)}</td></tr>`).join('');pageInfo.textContent=`${page+1} / ${Math.max(1,Math.ceil(d.total/size))}`;prev.disabled=page===0;next.disabled=(page+1)*size>=d.total;let h=await(await fetch(api+'holidays')).json();holidays.innerHTML=h.map(x=>`<li class="list-group-item d-flex justify-content-between">${x}<button class="btn btn-sm btn-outline-danger" onclick="delHoliday('${x}')">삭제</button></li>`).join('');let s=await(await fetch(api+'services')).json();services.innerHTML=s.map(x=>`<div class="col-md-4"><div class="service-card"><b>${x.name}</b><div class="small text-muted">${x.category} · ${x.durationMinutes}분 · ${Number(x.price).toLocaleString()}원</div><button class="btn btn-sm btn-outline-primary mt-3" onclick='editService(${JSON.stringify(x)})'>수정</button> <button class="btn btn-sm btn-outline-danger mt-3" onclick="delService(${x.id})">삭제</button></div></div>`).join('')}
function noShowConfirm(state){return state!=='CONFIRMED'||confirm('⚠ 승인된 예약을 거절·취소하면 노쇼 관련 처리로 기록될 수 있습니다. 고객과 충분히 확인하셨습니까?')}
async function changeStatus(id,status,current){if(['REJECTED','CANCELED'].includes(status)&&!noShowConfirm(current))return;if(status==='COMPLETED'&&!confirm('시술 완료 상태로 변경하시겠습니까?'))return;let r=await fetch(`${api}reservations/${id}/status?status=${status}`,{method:'PATCH'});if(!r.ok)alert((await r.json()).message||'처리에 실패했습니다.');load()}
async function reject(id,current){if(!noShowConfirm(current))return;let reason=prompt('거절 사유를 입력하세요.');if(!reason)return;let r=await fetch(`${api}reservations/${id}/reject?reason=${encodeURIComponent(reason)}`,{method:'PATCH'});if(!r.ok)alert((await r.json()).message||'처리에 실패했습니다.');load()}
async function delHoliday(d){if(confirm('휴무일을 삭제하시겠습니까?')){await fetch(`${api}holidays?holidayDate=${d}`,{method:'DELETE'});load()}}holidayForm.onsubmit=async e=>{e.preventDefault();await fetch(api+'holidays',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({holidayDate:e.target.date.value,reason:e.target.reason.value})});e.target.reset();load()};
const field=(form,name)=>form.elements.namedItem(name);async function request(url,options){let r=await fetch(url,options);if(!r.ok){let e=await r.json().catch(()=>({message:'처리에 실패했습니다.'}));alert(e.message||'처리에 실패했습니다.');return false}return true}function editService(x){['id','name','category','durationMinutes','price','description'].forEach(k=>field(serviceForm,k).value=x[k]||'')}async function delService(id){if(confirm('예약 이력은 보존하고 시술 메뉴만 삭제하시겠습니까?')&&await request(api+'services/'+id,{method:'DELETE'}))load()}serviceForm.onsubmit=async e=>{e.preventDefault();let f=e.target,id=field(f,'id').value,b={name:field(f,'name').value,category:field(f,'category').value,durationMinutes:field(f,'durationMinutes').value,price:field(f,'price').value,description:field(f,'description').value};if(await request(api+'services'+(id?'/'+id:''),{method:id?'PATCH':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)})){f.reset();load()}};prev.onclick=()=>{page--;load()};next.onclick=()=>{page++;load()};load();
</script></body></html>
