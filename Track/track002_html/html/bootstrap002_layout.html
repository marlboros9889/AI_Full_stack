d<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <title>Document</title>

<body>
    <div class="container  my-5 card">
        <h3 class="card-header">001.LAYOUT</h3>
        <p> 표 - 줄 - 칸</p>
        <p> .container    : 표, 전체박스, 아파트</p>
        <p> .row          : 박스 안에 줄, 각 층</p>
        <p> .col-sm-칸수   : 칸, 12칸을 기준</p>

    </div>

    <div class="m-5 card">
        <h3>002.container (아파트)</h3>
        <div class="container          bg-warning p-3">CONTAINER</div>
        <div class="container-fluid   bg-success p-3">container-fluid</div>
    </div>

    <div class="m-5 card">
        <h3>003.row (층) </h3>
        <div class="container bg-warning">
            <div class="row bg-warning  p-3"> 3층</div>
            <div class="row bg-info    p-3"> 2층</div>
            <div class="row bg-success p-3"> 1층</div>      
        </div>
    </div>

    <div class="m-5 card">
        <h3>004.col-디바이스-칸수 (칸)</h3>
        <div class="container"></div>
          <div class="row">
            <div class="col-sm-12 bg-warning p-3">칸은 12칸이 기본</div>
          </div><!-- row -->
          <div class="row">
             <div class="col-sm-6 bg-info p-3">칸은 12/2 6칸</div>
             <div class="col-sm-6 bg-warning p-3">칸은 12/2 6칸</div>
          </div><!-- row > col-sm-6, col-sm-6 -->
          
        <div class="row">
            <div class="col-sm-2 bg-info p-3">2.10 </div>
            <div class="col-sm-10 bg-success p-3">2. 10</div>
        </div>

        <div class="row">
            <div class="col-sm-5 bg-warning p-3">5</div>
            <div class="col-sm-5 bg-info p-3">5</div>
            <div class="col-sm-2 bg-primary p-3">2</div>
        </div>

        <div class="row">

            <div class="col-sm-4 bg-info p-3">4.4.4</div>
            <div class="col-sm-4 bg-success p-3">4.4.4</div>
        </div>

        <div class="row">
            <div class="col-sm-3 bg-dark p-3">3.3.3.3</div>
            <div class="col-sm-3 bg-danger p-3">3.3.3.3</div>
            <div class="col-sm-3 bg-ligh p-3">3.3.3.3</div>
            <div class="col-sm-3 bg-primary p-3">3.3.3.3</div>
        </div>
           
        
                
    </div>
