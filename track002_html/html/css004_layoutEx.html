<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>float</title>
 

    <style>
        *{margin: 0; padding: 0%;}
        body{font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
             background-image:linear-gradient(135deg #fff #fff);
            }
        
        h1  {border-left:  10px solid #123331;
             border-bottom: 1px solid #223113;
             margin: 30px 0; padding-left: 20px;
            }
        .container{ width: 80%; margin: 50px auto; border-radius: 10px;
                    background-color: antiquewhite; padding: 20px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.2); 
                    overflow: hidden;
                  } 
        ul.team img{ width: 50px; height: 50px; border-radius: 50%; margin-top: 100px; margin-bottom: 100px;
            border: 3px solid #123331; }

        ul{ width: 40%; padding: auto; list-style: none; background-color: aqua; overflow: hidden;} /* clear: both */
        li{float: left; margin: 10px;}         
        .t1{float: left;}
        .t2{float: right;} 

        ul.team li img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #9039d3;
                   transition:transform 0.8s , border-color 0.8s;
        }
        
        ul.team li :first-child  img :hover {transform: translateY(-20px);border-color: #00ccff;}
        ul.team li :nth-child(2)    img :hover {transform: rotateX(30deg); border-color: #1ab52f;}
        ul.team li :nth-child(3)    img :hover {transform: rotateZ(99deg);border-color: #9039d3;}
        ul.team li :last-child   img :hover {transform: rotate(180deg) scale(1.2);border-color: aqua;}

        </style>
 
</head>
<body>
    <div class="container t1">
        <h1>조은친구들</h1>
        <ul class="team t1">
            <li class="itme f1"><img src="./img/one.png" alt="이일두"></li>
            <li class="item f2"><img src="./img/four.png" alt="김현미"></li>
            <li class="item f2"><img src="./img/seven.png" alt="임채연"></li>
            <li class="item f2"><img src="./img/five.png" alt="장영탁"></li>
        </ul>

        <ul class="team t2">
           
            <li><img src="https://picsum.photos/100?random=1" alt="얼굴1"></li>
            <li><img src="https://picsum.photos/100?random=2" alt="얼굴2"></li>
            <li><img src="https://picsum.photos/100?random=3" alt="얼굴3"></li>
            <li><img src="https://picsum.photos/100?random=4" alt="얼굴4"></li>
            
        
        </ul>
    </div>
</body>
</html>
