spring:
  application:
    # Spring Boot 로그와 메타데이터에 표시되는 애플리케이션 이름입니다.
    name: marinboy
  profiles:
    # 기본 실행에서도 Google, Naver, Kakao OAuth2 로그인 설정을 함께 읽습니다.
    include: oauth
  datasource:
    # 로컬 데모와 포트폴리오 실행을 쉽게 하기 위한 인메모리 데이터베이스입니다.
    url: jdbc:h2:mem:marinboy;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      # 개발 중 H2 콘솔을 사용할 수 있게 합니다.
      enabled: true
  jpa:
    hibernate:
      # 실행할 때마다 스키마를 다시 만들어 샘플 데이터와 구조를 맞춥니다.
      ddl-auto: create-drop
    # 스키마 생성 후 data.sql을 실행합니다.
    defer-datasource-initialization: true
    # Thymeleaf 렌더링 중 숨어 있는 데이터베이스 접근을 막습니다.
    open-in-view: false
  sql:
    init:
      # Windows 환경에서도 data.sql의 한글 샘플 데이터가 깨지지 않도록 UTF-8로 읽습니다.
      encoding: UTF-8
      # 데모 시술과 예약 데이터를 항상 로드합니다.
      mode: always
  thymeleaf:
    # 템플릿 수정 사항이 바로 보이도록 캐시를 끕니다.
    cache: false
  servlet:
    multipart:
      # 시술 대표 이미지는 포트폴리오 데모 기준으로 5MB까지만 허용합니다.
      max-file-size: 5MB
      max-request-size: 5MB

server:
  # 로컬 실행 시 사용하는 기본 서버 포트입니다.
  port: 8080

app:
  upload:
    # 관리자가 업로드한 시술 대표 이미지가 저장되는 로컬 폴더입니다.
    service-image-dir: uploads/service-images
  db:
    # H2 모드에서 현재 데이터베이스 시간을 확인할 때 사용하는 쿼리입니다.
    validation-query: SELECT CURRENT_TIMESTAMP
    # DB 검증 API가 반환하는 데이터베이스 종류 표시값입니다.
    vendor: H2
